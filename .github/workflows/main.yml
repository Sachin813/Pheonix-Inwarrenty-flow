name: Postman Collection Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'
    - cron: '0 14 * * *'
    - cron: '0 6 * * 1-5'

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nodejs and npm
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      - name: Install Newman and html-extra globally
        run: |
              npm install -g newman
              npm install -g newman-reporter-htmlextra

      - name: Run the Postman collection with newman
        run: |
              newman run 'Inwarranty-flow Collection.postman_collection.json' \
              -e QA.postman_environment.json \
              -r cli,htmlextra \
              --reporter-htmlextra-export ./newman/index.html

      - name: Newman Report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Newman Report
          path: newman/*.html

      - name: Creating github page branch
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          publish_dir: newman/
      
      - name: Send Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME}}
          password: ${{ secrets.EMAIL_PASSWORD}}
          subject: Pheonix Flow Test Execution Notification
          to: sachin.rana7959@gmail.com
          from: ${{ secrets.EMAIL_USERNAME}}
          body: |
                Hi, 
                test flow has been executed and URL
                is: https://sachin813.github.io/Pheonix-Inwarrenty-flow/
          

          
